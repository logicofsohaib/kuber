{{- if .Values.mongo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.mongo.replicaCount }}
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mongo.service.targetPort }}
          resources:
            requests:
              cpu: {{ .Values.mongo.resources.requests.cpu | quote }}
              memory: {{ .Values.mongo.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.mongo.resources.limits.cpu | quote }}
              memory: {{ .Values.mongo.resources.limits.memory | quote }}
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
{{- end }}

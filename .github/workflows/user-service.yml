name: Deploy User Service

on:
  push:
    branches: [ "main" ]
    paths:
      - "userservice/**"
      - ".github/workflows/user-service.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Image
        run: |
          docker build -t sohaib22/mymicro-user-service:${{ github.sha }} ./userservice
          docker push sohaib22/mymicro-user-service:${{ github.sha }}

      - name: Update Deployment
        run: |
          kubectl set image deployment/user-service user-service=sohaib22/mymicro-user-service:${{ github.sha }} -n mymicro

      - name: Verify
        run: kubectl rollout status deployment/user-service -n mymicro

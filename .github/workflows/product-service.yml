name: Deploy Product Service

on:
  push:
    branches: [ "main" ]
    paths:
      - "productservice/**"
      - ".github/workflows/product-service.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Image
        run: |
          docker build -t sohaib22/mymicro-product-service:${{ github.sha }} ./productservice
          docker push sohaib22/mymicro-product-service:${{ github.sha }}

      - name: Update Deployment
        run: |
          kubectl set image deployment/product-service product-service=sohaib22/mymicro-product-service:${{ github.sha }} -n mymicro

      - name: Verify
        run: kubectl rollout status deployment/product-service -n mymicro

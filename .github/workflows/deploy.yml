name: Deploy Microservices to Minikube

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Debug repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Check cluster
        run: |
          kubectl get nodes
          kubectl config current-context
          minikube status

      - name: Create namespace
        run: |
          kubectl create namespace mymicro --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f app-secret.yaml -n mymicro
          kubectl apply -f app-configmap.yaml -n mymicro
          kubectl apply -f mongo-persistent.yaml -n mymicro
          kubectl apply -f quota.yaml -n mymicro
          kubectl apply -f networkpolicy.yaml -n mymicro
          kubectl apply -f apps.yaml -n mymicro
          kubectl apply -f ingress.yaml -n mymicro
          kubectl apply -f hpa.yaml -n mymicro

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/user-service -n mymicro
          kubectl rollout restart deployment/product-service -n mymicro
          kubectl rollout restart deployment/order-service -n mymicro
          kubectl rollout restart deployment/frontend -n mymicro

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/user-service -n mymicro --timeout=180s
          kubectl rollout status deployment/product-service -n mymicro --timeout=180s
          kubectl rollout status deployment/order-service -n mymicro --timeout=180s
          kubectl rollout status deployment/frontend -n mymicro --timeout=180s

      - name: Show resources
        run: |
          kubectl get pods -n mymicro -o wide
          kubectl get svc -n mymicro
          kubectl get ingress -n mymicro
